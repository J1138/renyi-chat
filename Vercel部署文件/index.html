<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>仁义纸业销售助手</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);height:100vh;display:flex;justify-content:center;align-items:center;padding:10px}
        .chat-container{width:100%;max-width:500px;height:90vh;background:white;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.3);display:flex;flex-direction:column;overflow:hidden}
        .chat-header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:20px;text-align:center}
        .chat-header h1{font-size:18px;font-weight:600;margin-bottom:5px}
        .chat-header p{font-size:12px;opacity:.9}
        .chat-messages{flex:1;overflow-y:auto;padding:20px;background:#f5f5f5}
        .message{margin-bottom:15px;display:flex;flex-direction:column}
        .message.user{align-items:flex-end}
        .message.assistant{align-items:flex-start}
        .message-bubble{max-width:80%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.5;word-wrap:break-word}
        .message.user .message-bubble{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border-bottom-right-radius:4px}
        .message.assistant .message-bubble{background:#fff;color:#333;border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.1)}
        .quick-actions{display:flex;gap:8px;padding:10px 15px;overflow-x:auto;background:#fff;border-top:1px solid #eee}
        .quick-action-btn{flex-shrink:0;padding:8px 16px;background:#f0f0f0;border:none;border-radius:20px;font-size:12px;color:#666;cursor:pointer;transition:all .3s}
        .quick-action-btn:hover{background:#667eea;color:#fff}
        .chat-input-container{padding:15px;background:#fff;border-top:1px solid #eee}
        .chat-input-wrapper{display:flex;gap:10px;align-items:center}
        .chat-input{flex:1;padding:12px 16px;border:2px solid #e0e0e0;border-radius:25px;font-size:14px;outline:none;transition:border-color .3s}
        .chat-input:focus{border-color:#667eea}
        .send-button{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s}
        .send-button:hover{transform:scale(1.05)}
        .send-button:disabled{opacity:.5;cursor:not-allowed}
        .typing-indicator{display:none;padding:10px;font-size:12px;color:#999;text-align:center}
        .typing-indicator.active{display:block}
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h1>🏭 仁义纸业销售助手</h1>
        <p>问问我们的产品信息</p>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="message assistant"><div class="message-bubble">你好！我是仁义纸业销售助手。请问有什么可以帮您？</div></div>
    </div>
    <div class="quick-actions">
        <button class="quick-action-btn" onclick="q('你们卖什么纸？')">📋 产品列表</button>
        <button class="quick-action-btn" onclick="q('60g米黄双胶有货吗？')">📦 库存查询</button>
        <button class="quick-action-btn" onclick="q('双胶纸多少钱一吨？')">💰 价格咨询</button>
        <button class="quick-action-btn" onclick="q('公司地址和电话')">📍 联系方式</button>
    </div>
    <div class="typing-indicator" id="typing">正在思考...</div>
    <div class="chat-input-container">
        <div class="chat-input-wrapper">
            <input type="text" class="chat-input" id="inp" placeholder="输入您的问题..." onkeypress="if(event.key==='Enter')send()">
            <button class="send-button" id="btn" onclick="send()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>
</div>
<script>
let waiting=false;
function q(m){document.getElementById('inp').value=m;send()}
async function send(){
    if(waiting)return;
    const inp=document.getElementById('inp'),msg=inp.value.trim();
    if(!msg)return;
    add(msg,'user');inp.value='';waiting=true;
    document.getElementById('btn').disabled=true;
    document.getElementById('typing').classList.add('active');
    try{
        const r=await fetch('/api',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
        const d=await r.json();
        add(d.reply||d.error||'抱歉，出错了','assistant');
    }catch(e){
        add('抱歉，服务暂时不可用。请稍后再试或拨打 0769-82223130 咨询。','assistant');
    }finally{waiting=false;document.getElementById('btn').disabled=false;document.getElementById('typing').classList.remove('active')}
}
function add(t,s){
    const c=document.getElementById('chatMessages');
    const d=document.createElement('div');d.className=`message ${s}`;
    const b=document.createElement('div');b.className='message-bubble';b.textContent=t;
    d.appendChild(b);c.appendChild(d);c.scrollTop=c.scrollHeight
}
</script>
</body>
</html>
